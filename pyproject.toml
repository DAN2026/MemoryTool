[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "trainer"
version = "0.1.0"
dependencies = [
    "pymem",
    "loguru",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
src = ["src"]
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]

[tool.pyright]
pythonVersion = "3.14"
pythonPlatform = "Windows"
venvPath = "."
venv = ".venv"
include = ["src"]
strict = ["src"]
reportMissingTypeStubs = "none"
reportUnknownMemberType = "none"